apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: canary-tutorial-app
  namespace: canary-tutorial
  annotations:
    circleci.com/project-id: ${CIRCLE_PROJECT_ID}
    circleci.com/operation-timeout: 20m
  labels:
    app: canary-tutorial-app
    circleci.com/component-name: canary-tutorial-app
    circleci.com/version: ${IMAGE_TAG}
spec:
  # 10 replicas chosen so the locked setWeight steps (5/25/50/100) map to
  # 1/3/5/10 pods. Replica-based canary can only represent percentages as
  # ratios of whole pods, so each setWeight rounds to the nearest tenth.
  # The 5% step exposes one canary pod alongside nine stable pods, which
  # is ~10% of LoadBalancer traffic.
  replicas: 10
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: canary-tutorial-app
  strategy:
    canary:
      # stableService and canaryService are deliberately NOT set. Setting
      # them is the opt-in for Argo Rollouts to mutate Service selectors
      # to scope each Service to one ReplicaSet. That's the correct mode
      # when paired with a traffic-management integration (NGINX/Istio/ALB)
      # but it's harmful here: it would remove the canary pod from the
      # LoadBalancer endpoint pool entirely, leaving canary with no user
      # traffic and the AnalysisRun measuring nothing.
      stableMetadata:
        labels:
          role: stable
      canaryMetadata:
        labels:
          role: canary
      analysis:
        templates:
          - templateName: canary-error-rate
        startingStep: 1
      steps:
        - setWeight: 5
        - pause: { duration: 2m }
        - setWeight: 25
        - pause: { duration: 5m }
        - setWeight: 50
        - pause: { duration: 5m }
        - setWeight: 100
  template:
    metadata:
      labels:
        app: canary-tutorial-app
        circleci.com/component-name: canary-tutorial-app
        circleci.com/version: ${IMAGE_TAG}
    spec:
      containers:
        - name: canary-tutorial-app
          image: ${DOCKERHUB_USERNAME}/canary-tutorial-app:${IMAGE_TAG}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: DEPLOY_SLOT
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['role']
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
